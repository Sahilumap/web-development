<!DOCTYPE html>
<html>
<head>
    <title>Simple Click Calculator</title>
    <style>
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #eef2f3;
            font-family: Arial, sans-serif;
        }

        .container {
            background: rgba(170, 7, 42, 0.171);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #1bc24d;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; 
        }

        button {
            background-color: #1dbb45;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #e0c218;
        }

        h3 {
            margin-top: 20px;
            color: #a7a0a0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Calculator</h2>
        
        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        
        <select id="operator">
            <option value="+">Add (+)</option>
            <option value="-">Subtract (-)</option>
            <option value="*">Multiply (×)</option>
            <option value="/">Divide (÷)</option>
        </select>

        <button onclick="calculateNow()">Calculate</button>

        <h3>Result: <span id="result">0</span></h3>
    </div>

    <script>
        function calculateNow() {
            
            let a = parseFloat(document.getElementById('num1').value);
            let b = parseFloat(document.getElementById('num2').value);
            let op = document.getElementById('operator').value; 
            let output = document.getElementById('result');

            
            if (isNaN(a) || isNaN(b)) {
                alert("Please enter both numbers!");
                return;
            }

            let total;

            
            switch (op) {
                case '+':
                    total = a + b;
                    break;
                case '-':
                    total = a - b;
                    break;
                case '*':
                    total = a * b; 
                    break;
                case '/':
                    total = (b !== 0) ? a / b : "Error: Div by 0";
                    break;
                default:
                    total = "Invalid Operation";
            }

    
            output.innerText = total;
        }
    </script>

</body>
</html>
